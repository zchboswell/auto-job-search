# ============================================================
# Job Search Pipeline — User Configuration
# ============================================================
# Generated by: python scripts/setup.py
# Edit this file to customize your job search pipeline.
# All scripts read from this config.
# ============================================================

# ── Your Profile ────────────────────────────────────────────
profile:
  name: "Jane Doe"
  name_short: "Jane"             # Used in cover letter sign-off
  credentials: "Ph.D."           # Appended to name in formal contexts
  email: "jane.doe@example.com"
  phone: "(555) 123-4567"
  location: "San Francisco Bay Area, CA"
  linkedin: "https://linkedin.com/in/janedoe"

  # Path to your resume/CV (.docx, .pdf, or .txt)
  # Used by the setup wizard and cover letter generator
  resume_path: "resources/resume.docx"

  # Current compensation (used to calibrate salary scoring)
  current_comp:
    base_salary: 120000
    bonus_percent: 10            # Annual bonus as % of base
    has_equity: true
    total_comp_estimate: 140000  # Your best estimate of total annual comp

  # Years of post-terminal-degree experience
  years_experience: 5

  # Current title and level (helps calibrate seniority scoring)
  current_title: "Senior Data Scientist"
  current_level: "senior_ic"     # Options: entry_ic, mid_ic, senior_ic, staff_ic, manager, director, vp

# ── Target Roles ────────────────────────────────────────────
# Keywords and preferences that guide LinkedIn searches and scoring.
target:
  # Primary search queries (used as LinkedIn search terms)
  search_queries:
    - "machine learning drug discovery scientist"
    - '"computational chemistry" drug discovery'
    - "cheminformatics pharma"

  # Keywords that signal a strong match in JD text
  positive_keywords:
    - "machine learning"
    - "drug discovery"
    - "computational chemistry"
    - "cheminformatics"
    - "molecular dynamics"
    - "PyTorch"
    - "RDKit"

  # Keywords that signal a poor match
  negative_keywords:
    - "intern"
    - "postdoc"
    - "contract"
    - "part-time"

  # Target seniority range
  min_seniority: "mid_ic"       # Won't consider below this
  max_seniority: "director"     # Won't consider above this

  # Industry focus
  industries:
    - "pharma"
    - "biotech"
    - "tech_bio"

# ── Location Preferences ────────────────────────────────────
location:
  home_region: "San Francisco Bay Area"

  # Score overrides by location type
  # These feed into the location dimension of fit scoring
  scoring:
    home_region: 10              # On-site/hybrid in your home region
    remote: 8                    # Fully remote
    commutable: 6                # Nearby regions reachable with hybrid
    major_hub: 4                 # Major industry hub requiring relocation
    other_us: 2                  # Non-hub US location
    international: 0             # International relocation

  # Named regions and their score category
  regions:
    "San Francisco":     "home_region"
    "South San Francisco": "home_region"
    "San Mateo":         "home_region"
    "Redwood City":      "home_region"
    "San Jose":          "commutable"
    "Boston":            "major_hub"
    "Cambridge":         "major_hub"
    "San Diego":         "major_hub"
    "New York":          "major_hub"
    "Research Triangle": "major_hub"

# ── Fit Scoring ─────────────────────────────────────────────
# Seven scoring dimensions, each 0-10. Weights must sum to 1.0.
# The rubric text is shown to the AI during scoring to calibrate ratings.
scoring:
  dimensions:
    technical:
      weight: 0.25
      label: "Technical Match"
      description: "Overlap with core skill set"
      rubric:
        10: "Direct match to primary skills. Role uses your core tools and methods daily."
        8:  "Strong overlap in 2+ areas. Most of your skill set is relevant."
        6:  "Moderate overlap. One core area matches well."
        4:  "Tangential. Adjacent skills used differently."
        2:  "Weak. Only surface-level keyword overlap."
        0:  "No meaningful technical overlap."

    domain:
      weight: 0.20
      label: "Domain Context"
      description: "Role is in your target industry/domain"
      rubric:
        10: "Directly in your target domain. Core workflow matches."
        8:  "Adjacent to target domain. Platform/tool building for your domain."
        6:  "Same industry but different function."
        4:  "Related industry but outside your domain."
        2:  "Technical role outside your industry using some relevant methods."
        0:  "No domain connection."

    seniority:
      weight: 0.10
      label: "Seniority Fit"
      description: "Role level matches your experience"
      rubric:
        10: "Ideal level match. Expects your years of experience."
        8:  "Slight stretch up or down. Achievable."
        6:  "Notable mismatch. May need 3+ more years, or is below your level."
        4:  "Significant mismatch. Very senior or very junior."
        2:  "Intern, postdoc, or C-suite."
        0:  "Completely wrong level."

    location:
      weight: 0.10
      label: "Location"
      description: "Proximity to home region or remote flexibility"
      # Rubric is auto-generated from the location.scoring section above

    compensation:
      weight: 0.15
      label: "Compensation"
      description: "Must meet or beat current total comp"
      rubric:
        10: "Clear upgrade. 15%+ above current total comp."
        8:  "Competitive step up. 5-15% above current."
        6:  "Roughly lateral. Would need other strong reasons."
        4:  "Pay cut. Only worth it for exceptional opportunity."
        2:  "Significant pay cut. Hard to justify."
        0:  "Well below market or no salary info suggesting below market."

    company_health:
      weight: 0.12
      label: "Company Health"
      description: "Funding, runway, growth, stability, culture"
      rubric:
        10: "Large established company or well-capitalized growth-stage. Strong financials, active hiring."
        8:  "Mid-stage with strong fundamentals. Growing team, good reputation."
        6:  "Earlier stage but funded. Some execution risk."
        4:  "Warning signs: layoffs, leadership turnover, financial stress."
        2:  "Known distress. Major layoffs, failed products, toxic culture."
        0:  "Company appears to be winding down or is a staffing agency."

    trajectory:
      weight: 0.08
      label: "Career Trajectory"
      description: "Does this role advance your long-term career goals?"
      rubric:
        10: "Clear path toward your career goal. Skill expansion, growing responsibility."
        8:  "Strong growth potential. Reputable company, good learning environment."
        6:  "Decent role but growth path unclear."
        4:  "Risk of stagnation. Niche role or declining relevance."
        2:  "Step backward. Less responsibility or relevance."
        0:  "Dead end."

  # Tier thresholds (composite score 0-100)
  tiers:
    top: 80
    strong: 60
    worth_a_look: 40
    stretch: 25
    # Below 25 = skip

  # Auto-trigger cover letter generation at this composite score
  cover_letter_threshold: 85

# ── Cover Letter Voice ──────────────────────────────────────
# Customizes the tone and style of auto-generated cover letters.
cover_letter:
  sign_off: "Best,"
  font: "Georgia"
  font_size_body: 11            # Points
  font_size_name: 12
  target_words: 250              # Approximate body text length
  paragraphs: 4                  # Target number of paragraphs

  # Anti-patterns the AI should avoid (added to the cover letter skill prompt)
  anti_patterns:
    - "The hard part of X isn't Y, it's Z"
    - "What sets me apart is..."
    - "My unique combination of..."
    - "Opening with a grand statement about the field"
    - "Listing achievements separated by semicolons or em dashes"

# ── Evidence Bank ───────────────────────────────────────────
# Your key achievements, indexed by theme. The cover letter generator
# matches JD keywords to these themes and weaves the relevant ones
# into each letter. This is auto-populated by the setup wizard from
# your resume, but you should review and edit.
#
# Format:
#   theme_key:
#     label: "Human-readable theme name"
#     achievements:
#       - claim: "What you did (1 sentence)"
#         evidence: "Specifics, metrics, impact (1-2 sentences)"
#     keywords:  # JD words that trigger this theme
#       - "keyword1"
#       - "keyword2"
evidence_bank:
  machine_learning:
    label: "Machine Learning & Data Science"
    achievements:
      - claim: "Built predictive models for [domain]"
        evidence: "Description of your ML work with metrics and impact."
    keywords:
      - "machine learning"
      - "ML"
      - "deep learning"
      - "neural network"
      - "PyTorch"
      - "predictive model"

  domain_expertise:
    label: "Domain Expertise"
    achievements:
      - claim: "Led [project] in [domain]"
        evidence: "Description of domain-specific work with context."
    keywords:
      - "your"
      - "domain"
      - "keywords"
      - "here"

  leadership:
    label: "Cross-functional Leadership"
    achievements:
      - claim: "Drove [initiative] across teams"
        evidence: "Description of leadership and collaboration."
    keywords:
      - "cross-functional"
      - "leadership"
      - "project team"
      - "collaboration"

# ── LinkedIn Search Settings ────────────────────────────────
linkedin:
  # Time filter for job searches
  time_filter: "r604800"         # Past week. Options: r86400 (24h), r604800 (week), r2592000 (month)
  sort_by: "DD"                  # DD = most recent. R = most relevant.
  location_filter: "United States"
  max_results_per_query: 25      # Stop scrolling after this many per query

# ── Report Settings ─────────────────────────────────────────
reports:
  format: "markdown"             # markdown or docx
  include_trends: true
  include_low_fit: true          # Include low-scoring listings for completeness
  output_dir: "outputs/reports"
